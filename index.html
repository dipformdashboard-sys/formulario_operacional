<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Abertura de Requisição</title>

<style>

body{
font-family:Arial, sans-serif;
background:#eef2f6;
padding:40px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

h2{
margin-bottom:25px;
color:#1e293b;
text-align:center;
}

/* GRID CORRIGIDO */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.campo{
display:flex;
flex-direction:column;
}

.full{
grid-column:1 / -1;
}

label{
font-weight:600;
font-size:14px;
color:#334155;
margin-bottom:5px;
}

input,select,textarea{
padding:10px;
border:1px solid #cbd5e1;
border-radius:6px;
font-size:14px;
width:100%;
box-sizing:border-box;
}

textarea{
resize:none;
height:100px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:14px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

/* MENSAGEM */
.msg{
margin-top:20px;
padding:12px;
border-radius:6px;
display:none;
font-size:14px;
text-align:center;
}

.sucesso{
background:#d1fae5;
color:#065f46;
}

.erro{
background:#fee2e2;
color:#7f1d1d;
}

/* LOADING */
.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
display:none;
}

.spinner{
width:60px;
height:60px;
border:6px solid #ddd;
border-top:6px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* RESPONSIVO */
@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="container">

<h2>Abertura de Requisição</h2>

<form id="formulario">

<div class="grid">

<div class="campo">
<label>Solicitante</label>
<input name="solicitante" required>
</div>

<div class="campo">
<label>Lotação</label>
<input name="lotacao" required>
</div>

<div class="campo">
<label>Canal</label>
<select name="canal">
<option>Email</option>
<option>Telefone</option>
<option>WhatsApp</option>
<option>Presencial</option>
</select>
</div>

<div class="campo">
<label>Tipo de Requisição</label>
<input name="tipo" required>
</div>

<div class="campo full">
<label>Descrição</label>
<textarea name="descricao" required></textarea>
</div>

<div class="campo">
<label>Responsável</label>
<input name="responsavel">
</div>

<div class="campo">
<label>Participantes</label>
<input name="participantes">
</div>

<div class="campo full">
<button id="btnEnviar" type="submit">Registrar Requisição</button>
</div>

</div>

</form>

<div id="mensagem" class="msg"></div>

</div>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<script>
const form = document.getElementById("formulario");
const msg = document.getElementById("mensagem");
const loading = document.getElementById("loading");
const btn = document.getElementById("btnEnviar");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const dados = new FormData(form);

  loading.style.display = "flex";
  btn.disabled = true;

  fetch("https://script.google.com/macros/s/AKfycbz5UKYgpRxCjUJx6ilQBWDzO-StPxs4w214VWNanoXPKCaDYrgBK4bPRNAAIooia-5SnA/exec", {
    method: "POST",
    body: dados,
    mode: "no-cors"
  })
  .then(() => {
    msg.style.display = "block";
    msg.className = "msg sucesso";
    msg.innerText = "Requisição registrada com sucesso!";
    form.reset();
  })
  .catch(() => {
    msg.style.display = "block";
    msg.className = "msg erro";
    msg.innerText = "Erro ao enviar requisição.";
  })
  .finally(() => {
    loading.style.display = "none";
    btn.disabled = false;
  });
});
</script>

</body>
</html>
