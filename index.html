<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <title>Atividades Realizadas</title>

    <style>
        /* 🎨 RESET E FONTES */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 0;
            padding-top: 90px;
            color: #334155;
        }

        /* 🔷 BARRA SUPERIOR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: #1e3a8a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar .logo {
            height: 80px;
            width: auto;
            object-fit: contain;
        }

        .navbar h1 {
            color: #ffffff;
            font-size: 22px;
            margin: 0;
            font-weight: 600;
        }

        .navbar-right a {
            text-decoration: none;
            background: #eab308;
            color: #1e293b;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .navbar-right a:hover {
            background: #facc15;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* 📦 CONTAINER LARGO TOTAL */
        .container {
            max-width: 98%;
            margin: 0 auto 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        .container h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #0f172a;
            font-size: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        /* 🔲 GRID ORGANIZADO */
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* Sistema de 6 colunas para flexibilidade */
            gap: 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            grid-column: span 2; /* Padrão: 3 campos por linha (6/2 = 3) */
        }

        /* Ajuste para 2 campos por linha (6/3 = 2) */
        .metade {
            grid-column: span 3;
        }

        .full {
            grid-column: span 6;
        }

        label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input, textarea {
            padding: 0 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            background-color: #f8fafc;
            height: 42px;
        }

        textarea {
            height: 80px;
            padding: 10px 14px;
        }

        /* 🎨 CHOICES.JS CUSTOMIZADO */
        .choices__inner {
            background-color: #f8fafc !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 6px !important;
            min-height: 42px !important;
            padding: 2px 10px !important;
            display: flex;
            align-items: center;
        }

        /* Participantes mais compacto */
        .choices__list--multiple .choices__item {
            background-color: #1e3a8a !important;
            border: none !important;
            border-radius: 4px !important;
            font-size: 11px !important;
            padding: 1px 5px !important;
            margin: 2px !important;
        }

        .choices__input {
            background-color: transparent !important;
            font-size: 13px !important;
        }

        /* 🔘 BOTÃO */
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover { background: #1d4ed8; }

        /* ⏳ LOADING */
        .loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); display: none;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media(max-width: 1000px) {
            .campo, .metade { grid-column: span 3; }
        }
        @media(max-width: 600px) {
            .campo, .metade, .full { grid-column: span 6; }
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="navbar-left">
            <img src="PCBA.png" alt="Logo" class="logo">
            <h1>Atividades Realizadas</h1>
        </div>
        <div class="navbar-right">
            <a href="dashboard.html">Dashboard</a>
        </div>
    </header>

    <div class="container">
        <h2>Registro de Nova Atividade</h2>

        <form id="formulario">
            <div class="grid">
                <div class="campo">
                    <label>Solicitante</label>
                    <input name="solicitante" required placeholder="Nome">
                </div>
                <div class="campo">
                    <label>Lotação</label>
                    <select name="lotacao" id="lotacao" required><option value="">Carregando...</option></select>
                </div>
                <div class="campo">
                    <label>Responsável</label>
                    <select name="responsavel" id="responsavel" required><option value="">Carregando...</option></select>
                </div>

                <div class="campo">
                    <label>Tipo de Pesquisa</label>
                    <select name="tipo" id="tipo" required><option value="">Carregando...</option></select>
                </div>
                <div class="campo">
                    <label>Canal</label>
                    <select name="canal" id="canal" required><option value="">Carregando...</option></select>
                </div>
                <div class="campo">
                    <label>Data</label>
                    <input type="date" name="data" id="data">
                </div>

                <div class="metade">
                    <label>Participantes (Múltiplos)</label>
                    <select name="participantes" id="participantes" multiple required></select>
                </div>
                <div class="metade">
                    <label>Quantidade / Volume</label>
                    <input name="quantidade" type="number" min="1" required placeholder="Ex: 10">
                </div>

                <div class="full">
                    <label>Descrição</label>
                    <select name="descricao" id="descricao" required><option value="">Carregando...</option></select>
                </div>

                <div class="full">
                    <label>Observação</label>
                    <textarea name="observacao" placeholder="Detalhes adicionais importantes..."></textarea>
                </div>

                <div class="full">
                    <button id="btnEnviar" type="submit">Finalizar e Registrar</button>
                </div>
            </div>
        </form>
    </div>

    <div id="loading" class="loading"><div class="spinner"></div></div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbz5UKYgpRxCjUJx6ilQBWDzO-StPxs4w214VWNanoXPKCaDYrgBK4bPRNAAIooia-5SnA/exec";
        const form = document.getElementById("formulario");
        const loading = document.getElementById("loading");

        fetch(URL_SCRIPT)
            .then(res => res.json())
            .then(data => {
                const fillSelect = (id, items) => {
                    const el = document.getElementById(id);
                    el.innerHTML = id === 'participantes' ? '' : '<option value="">Selecione</option>';
                    if(items) items.forEach(i => {
                        let opt = document.createElement("option");
                        opt.value = i; opt.textContent = i;
                        el.appendChild(opt);
                    });
                };
                fillSelect("responsavel", data.usuarios);
                fillSelect("lotacao", data.lotacoes);
                fillSelect("tipo", data.tipos);
                fillSelect("descricao", data.descricoes);
                fillSelect("canal", data.canais);
                fillSelect("participantes", data.participantes);
                ativarBuscaSelects();
            });

        let sLot, sTip, sRes, sCan, sDes, sPar;

        function ativarBuscaSelects() {
            const cfg = { searchEnabled: true, itemSelectText: '', shouldSort: false };
            sLot = new Choices('#lotacao', cfg);
            sTip = new Choices('#tipo', cfg);
            sRes = new Choices('#responsavel', cfg);
            sCan = new Choices('#canal', cfg);
            sDes = new Choices('#descricao', cfg);
            sPar = new Choices('#participantes', { ...cfg, removeItemButton: true, placeholderValue: 'Adicionar nomes...' });
        }

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            const dados = new FormData(form);
            if (!dados.get("data")) dados.set("data", new Date().toISOString().split("T")[0]);
            const particip = dados.getAll("participantes");
            if(particip.length > 0) dados.set("participantes", particip.join(", "));

            loading.style.display = "flex";
            document.getElementById("btnEnviar").disabled = true;

            fetch(URL_SCRIPT, { method: "POST", body: dados })
                .then(() => {
                    alert("Atividade registrada com sucesso!");
                    form.reset();
                    [sLot, sTip, sRes, sCan, sDes, sPar].forEach(s => s.removeActiveItems());
                })
                .finally(() => {
                    loading.style.display = "none";
                    document.getElementById("btnEnviar").disabled = false;
                });
        });
    </script>
</body>
</html>
