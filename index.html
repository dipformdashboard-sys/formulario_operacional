<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<title>Atividades Realizadas</title>

<style>
body{
font-family:Arial, sans-serif;
background:#eef2f6;
padding:40px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* 🔷 TOPO */
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.logo{
height:150px;
}

.menu{
display:flex;
gap:10px;
}

.menu a{
text-decoration:none;
background:#2563eb;
color:white;
padding:8px 15px;
border-radius:6px;
font-size:14px;
}

.menu a:hover{
background:#1d4ed8;
}

h2{
margin-bottom:25px;
color:#1e293b;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.campo{
display:flex;
flex-direction:column;
}

.full{
grid-column:1 / -1;
}

label{
font-weight:600;
font-size:14px;
color:#334155;
margin-bottom:5px;
}

input,select,textarea{
padding:10px;
border:1px solid #cbd5e1;
border-radius:6px;
font-size:14px;
width:100%;
box-sizing:border-box;
}

textarea{
resize:none;
height:100px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:14px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:disabled{
background:#9ca3af;
}

.msg{
margin-top:20px;
padding:12px;
border-radius:6px;
display:none;
text-align:center;
}

.sucesso{background:#d1fae5;color:#065f46;}
.erro{background:#fee2e2;color:#7f1d1d;}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
display:none;
}

.spinner{
width:60px;
height:60px;
border:6px solid #ddd;
border-top:6px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
.topo{flex-direction:column; gap:10px;}
}
</style>
</head>

<body>

<div class="container">

<!-- 🔷 TOPO COM LOGO E MENU -->
<div class="topo">
  <img src="PCBA.png" class="logo">
  <div class="menu">
    <a href="dashboard.html">📊 Dashboard</a>
  </div>
</div>

<h2>Atividades Realizadas</h2>

<form id="formulario">

<div class="grid">

<div class="campo">
<label>Solicitante</label>
<input name="solicitante" required placeholder="Digite o solicitante">
</div>

<div class="campo">
<label>Lotação</label>
<select name="lotacao" id="lotacao" required>
<option value="">Carregando...</option>
</select>
</div>

<div class="campo">
<label>Tipo de Pesquisa</label>
<select name="tipo" id="tipo" required>
<option value="">Carregando...</option>
</select>
</div>

<div class="campo">
<label>Canal</label>
<select name="canal" id="canal" required>
<option value="">Carregando...</option>
</select>
</div>

<div class="campo">
<label>Responsável</label>
<select name="responsavel" id="responsavel" required>
<option value="">Carregando...</option>
</select>
</div>

<div class="campo">
<label>Participantes</label>
<select name="participantes" id="participantes" required>
<option value="">Carregando...</option>
</select>
</div>

<!-- 🔥 NOVO CAMPO -->
<div class="campo">
<label>Quantidade / Volume</label>
<input name="quantidade" type="number" min="1" placeholder="Ex: 10" required>
</div>

<div class="campo full">
<label>Descrição</label>
<select name="descricao" id="descricao" required>
<option value="">Carregando...</option>
</select>
</div>

<div class="campo full">
<label>Observação</label>
<textarea name="observacao" placeholder="Detalhes adicionais..."></textarea>
</div>

<div class="campo full">
<button id="btnEnviar" type="submit">Registrar Pesquisa</button>
</div>

</div>

</form>

<div id="mensagem" class="msg"></div>

</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbz5UKYgpRxCjUJx6ilQBWDzO-StPxs4w214VWNanoXPKCaDYrgBK4bPRNAAIooia-5SnA/exec";

const form = document.getElementById("formulario");
const msg = document.getElementById("mensagem");
const loading = document.getElementById("loading");
const btn = document.getElementById("btnEnviar");

// 🔥 CARREGA DADOS
fetch(URL_SCRIPT)
.then(res => res.json())
.then(data => {

const usuarios = document.getElementById("responsavel");
const lotacoes = document.getElementById("lotacao");
const tipos = document.getElementById("tipo");
const descricoes = document.getElementById("descricao");
const canais = document.getElementById("canal");
const participantes = document.getElementById("participantes");

usuarios.innerHTML = '<option value="">Selecione</option>';
lotacoes.innerHTML = '<option value="">Selecione</option>';
tipos.innerHTML = '<option value="">Selecione</option>';
descricoes.innerHTML = '<option value="">Selecione</option>';
canais.innerHTML = '<option value="">Selecione</option>';
participantes.innerHTML = '<option value="">Selecione</option>';

if(data.tipos){
  data.tipos.forEach(t => {
    let opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    tipos.appendChild(opt);
  });
}

if(data.canais){
  data.canais.forEach(c => {
    let opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    canais.appendChild(opt);
  });
}

if(data.participantes){
  data.participantes.forEach(p => {
    let opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p;
    participantes.appendChild(opt);
  });
}

if(data.usuarios){
  data.usuarios.forEach(u => {
    let opt = document.createElement("option");
    opt.value = u;
    opt.textContent = u;
    usuarios.appendChild(opt);
  });
}

if(data.lotacoes){
  data.lotacoes.forEach(l => {
    let opt = document.createElement("option");
    opt.value = l;
    opt.textContent = l;
    lotacoes.appendChild(opt);
  });
}

if(data.descricoes){
  data.descricoes.forEach(d => {
    let opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    descricoes.appendChild(opt);
  });
}
ativarBuscaSelects();
})
.catch(() => {
  alert("Erro ao carregar dados da API");
});

let selectLotacao, selectTipo, selectResponsavel, selectCanal, selectDescricao, selectParticipantes;

function ativarBuscaSelects(){

  selectLotacao = new Choices('#lotacao', {
    searchEnabled: true,
    itemSelectText: '',
    shouldSort: false
  });

  selectTipo = new Choices('#tipo', {
    searchEnabled: true,
    itemSelectText: '',
    shouldSort: false
  });

  selectResponsavel = new Choices('#responsavel', {
    searchEnabled: true,
    itemSelectText: '',
    shouldSort: false
  });

  selectCanal = new Choices('[name="canal"]', {
    searchEnabled: true,
    itemSelectText: '',
    shouldSort: false
  });

  selectDescricao = new Choices('#descricao', {
  searchEnabled: true,
  itemSelectText: '',
  shouldSort: false
});

  selectParticipantes = new Choices('#participantes', {
    searchEnabled: true,
    itemSelectText: '',
    shouldSort: false
  });
}

// 🔥 ENVIO
form.addEventListener("submit", function(e){
  e.preventDefault();

  const dados = new FormData(form);

  loading.style.display = "flex";
  btn.disabled = true;
  btn.innerText = "Enviando...";

  fetch(URL_SCRIPT, {
    method: "POST",
    body: dados
  })
  .then(res => res.text())
  .then(() => {
    msg.style.display = "block";
    msg.className = "msg sucesso";
    msg.innerText = "Pesquisa registrada com sucesso!";
    form.reset();

    selectLotacao.removeActiveItems();
    selectTipo.removeActiveItems();
    selectResponsavel.removeActiveItems();
    selectCanal.removeActiveItems();
    selectDescricao.removeActiveItems();
    selectParticipantes.removeActiveItems();
  })
  .catch(() => {
    msg.style.display = "block";
    msg.className = "msg erro";
    msg.innerText = "Erro ao enviar.";
  })
  .finally(() => {
    loading.style.display = "none";
    btn.disabled = false;
    btn.innerText = "Registrar Pesquisa";
  });
});
</script>

</body>
</html>
