<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Abertura de Requisição</title>

<style>

body{
font-family:Arial;
background:#eef2f6;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:14px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

.msg{
margin-top:15px;
padding:10px;
border-radius:5px;
display:none;
}

.sucesso{
background:#d1fae5;
color:#065f46;
}

.erro{
background:#fee2e2;
color:#7f1d1d;
}

/* LOADING */
.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
display:none;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="container">

<h2>Abertura de Requisição</h2>

<form id="formulario">

<label>Solicitante</label>
<input name="solicitante" required>

<label>Lotação</label>
<input name="lotacao" required>

<label>Canal</label>
<select name="canal">
<option>Email</option>
<option>Telefone</option>
<option>WhatsApp</option>
<option>Presencial</option>
</select>

<label>Tipo de Requisição</label>
<input name="tipo" required>

<label>Descrição</label>
<textarea name="descricao" required></textarea>

<label>Responsável</label>
<input name="responsavel">

<label>Participantes</label>
<input name="participantes">

<button id="btnEnviar" type="submit">Registrar Requisição</button>

</form>

<div id="mensagem" class="msg"></div>

</div>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<script>
const form = document.getElementById("formulario");
const msg = document.getElementById("mensagem");
const loading = document.getElementById("loading");
const btn = document.getElementById("btnEnviar");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const dados = new FormData(form);

  // 🔥 ativa loading
  loading.style.display = "flex";
  btn.disabled = true;

  fetch("https://script.google.com/macros/s/AKfycbz5UKYgpRxCjUJx6ilQBWDzO-StPxs4w214VWNanoXPKCaDYrgBK4bPRNAAIooia-5SnA/exec", {
    method: "POST",
    body: dados
  })
  .then(() => {
    msg.style.display = "block";
    msg.className = "msg sucesso";
    msg.innerText = "Requisição registrada com sucesso!";
    form.reset();
  })
  .catch(() => {
    msg.style.display = "block";
    msg.className = "msg erro";
    msg.innerText = "Erro ao enviar requisição.";
  })
  .finally(() => {
    // 🔥 desativa loading
    loading.style.display = "none";
    btn.disabled = false;
  });
});
</script>

</body>
</html>
