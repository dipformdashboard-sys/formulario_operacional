<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard NAP</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>
body{
  font-family:Arial;
  background:#f8fafc;
  color:#1e293b;
  margin:0;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.header img{ height:130px; }

.titulo{
  flex:1;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#1e3a8a;
}

.btn{
  background:#facc15;
  color:#1e293b;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:5px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  border-top:5px solid #facc15;
}

.card p{
  margin:0;
  font-size:13px;
  color:#64748b;
}

.card h2{
  margin-top:8px;
  font-size:26px;
  color:#1e3a8a;
}

/* FILTRO */
.filtro{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
  padding:8px;
  border-radius:6px;
  border:1px solid #cbd5e1;
}

/* GRÁFICOS */
.graficos{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  align-items:stretch;
}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  height:260px; /* 🔥 controla altura real */
  display:flex;
  flex-direction:column;
}

.box canvas{
  flex:1;
}

.box h3{
  color:#1e3a8a;
  margin-bottom:10px;
}

canvas{
  width:100% !important;
  height:220px !important;
}

/* TABELA */
.table-box{
  margin-top:25px;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #e2e8f0;
}

th{
  color:#1e3a8a;
}

tr:hover{
  background:#f1f5f9;
}

/* RESPONSIVO */
@media(max-width:900px){
  .graficos{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="header">
  <img src="PCBA.png">
  <div class="titulo">Sumário de Ativiades - Núcleo de Assuntos Prisionais (NAP)</div>
  <button class="btn" onclick="location.href='index.html'">Novo Registro</button>
  <button class="btn" onclick="gerarPDF()">Gerar PDF</button>
</div>

<!-- INDICADORES -->
<div class="cards">
  <div class="card"><p>Total</p><h2 id="total"></h2></div>
  <div class="card"><p>Hoje</p><h2 id="hoje"></h2></div>
  <div class="card"><p>Semana</p><h2 id="semana"></h2></div>
  <div class="card"><p>Mês</p><h2 id="mes"></h2></div>
  <div class="card"><p>Ano</p><h2 id="ano"></h2></div>
</div>

<!-- FILTRO -->
<div class="filtro">
  <label>De:</label>
  <input type="date" id="inicio">
  <label>Até:</label>
  <input type="date" id="fim">
  <button class="btn" onclick="aplicarFiltro()">Filtrar</button>
</div>

<!-- GRÁFICOS -->
<div class="graficos">

  <div class="box">
    <h3>📈 Histórico por Mês</h3>
    <canvas id="historico"></canvas>
  </div>

  <div class="box">
    <h3>📡 Canal</h3>
    <canvas id="canal"></canvas>
  </div>

  <div class="box">
    <h3>📦 Tipo</h3>
    <canvas id="tipo"></canvas>
  </div>

  <div class="box">
    <h3>📍 Lotação</h3>
    <canvas id="lotacao"></canvas>
  </div>

</div>

<!-- TABELA -->
<div class="table-box">
  <h3>📄 Registros</h3>
  <table>
    <thead>
      <tr>
        <th>Lotação</th>
        <th>Tipo</th>
        <th>Quantidade</th>
        <th>Canal</th>
        <th>Descrição</th>
        <th>Responsável</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbz5UKYgpRxCjUJx6ilQBWDzO-StPxs4w214VWNanoXPKCaDYrgBK4bPRNAAIooia-5SnA/exec";

Chart.register(ChartDataLabels); // 🔥 AQUI

let dados = [];
let charts = {};

let dadosFiltrados = [];
let paginaAtual = 1;
const porPagina = 6;

function criar(id, tipo, labels, data){
  if(charts[id]) charts[id].destroy();

function gerarCores(qtd){
  const cores = [];

  for(let i = 0; i < qtd; i++){
    const hue = (i * 360 / qtd); // distribui no círculo
    cores.push(`hsl(${hue}, 70%, 55%)`);
  }

  return cores;
}

  charts[id] = new Chart(document.getElementById(id), {
    type: tipo,
    data:{
      labels,
      datasets:[{
        data,
        backgroundColor: tipo === "line"
          ? "rgba(250, 204, 21, 0.3)"
          : gerarCores(labels.length),
        borderColor: "#1e3a8a",
        borderWidth: 2,
        fill: tipo === "line",
        tension: 0.4 // 🔥 deixa linha suave
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{
          labels:{
            color:"#1e293b",
            font:{ size:12 }
          }
        },
        datalabels:{
          color:"#000",
          font:{ weight:"bold", size:10 },
          formatter: (value) => value
        }
      },
      scales: tipo !== 'pie' && tipo !== 'doughnut' ? {
        x:{
          ticks:{ color:"#64748b" },
          grid:{ color:"#e5e7eb" }
        },
        y:{
          ticks:{ color:"#64748b" },
          grid:{ color:"#e5e7eb" }
        }
      } : {}
    }
  });
}

function aplicarFiltro(){
  const ini = document.getElementById("inicio").value;
  const fim = document.getElementById("fim").value;

  let filtrado = [...dados];

  if(ini) filtrado = filtrado.filter(r => new Date(r.data) >= new Date(ini));
  if(fim) filtrado = filtrado.filter(r => new Date(r.data) <= new Date(fim));

atualizarTotal(filtrado); // 🔥 só o TOTAL muda
processar(filtrado);
}

function atualizarTotal(rel){
  let total = 0;

  rel.forEach(r=>{
    total += Number(r.quantidade) || 0;
  });

  totalEl.innerText = total;
}

function calcularIndicadoresBase(rel){

  let total=0, hoje=0, semana=0, mes=0, ano=0;

  const now = new Date();
  const semanaIni = new Date();
  semanaIni.setDate(now.getDate()-7);

  rel.forEach(r=>{
    const d = new Date(r.data);
    const q = Number(r.quantidade)||0;

    total += q;

    if(d.toDateString() === now.toDateString()) hoje += q;
    if(d >= semanaIni) semana += q;
    if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) mes += q;
    if(d.getFullYear() === now.getFullYear()) ano += q;
  });

  totalEl.innerText = total;
  hojeEl.innerText = hoje;
  semanaEl.innerText = semana;
  mesEl.innerText = mes;
  anoEl.innerText = ano;
}

function processar(rel){

  let total=0, hoje=0, semana=0, mes=0, ano=0;

  const now = new Date();
  const semanaIni = new Date();
  semanaIni.setDate(now.getDate()-7);

  rel.forEach(r=>{
    const d = new Date(r.data);
    const q = Number(r.quantidade)||0;

    total += q;
    if(d.toDateString()===now.toDateString()) hoje+=q;
    if(d>=semanaIni) semana+=q;
    if(d.getMonth()===now.getMonth()) mes+=q;
    if(d.getFullYear()===now.getFullYear()) ano+=q;
  });

  const tipo={}, canal={}, lot={}, hist={};

  rel.forEach(r=>{
    const q = Number(r.quantidade)||0;

    tipo[r.tipo||"Sem"]=(tipo[r.tipo]||0)+q;
    canal[r.canal||"Sem"]=(canal[r.canal]||0)+q;
    lot[r.lotacao||"Sem"]=(lot[r.lotacao]||0)+q;

    const mesAno = new Date(r.data).toISOString().slice(0,7);
    hist[mesAno]=(hist[mesAno]||0)+q;
  });

  criar("tipo","bar",Object.keys(tipo),Object.values(tipo));
  criar("canal","pie",Object.keys(canal),Object.values(canal));
  criar("lotacao","pie",Object.keys(lot),Object.values(lot));
  criar("historico","line",Object.keys(hist),Object.values(hist));

dadosFiltrados = rel.slice().reverse();
paginaAtual = 1;
renderTabela();
}

function renderTabela(){

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  const inicio = (paginaAtual - 1) * porPagina;
  const pagina = dadosFiltrados.slice(inicio, inicio + porPagina);

  pagina.forEach(r=>{
    tabela.innerHTML += `
      <tr>
        <td>${r.lotacao||"-"}</td>
        <td>${r.tipo||"-"}</td>
        <td>${r.quantidade||"-"}</td>
        <td>${r.canal||"-"}</td>
        <td>${r.descricao||"-"}</td>
        <td>${r.responsavel||"-"}</td>
        <td>${r.data ? new Date(r.data).toLocaleDateString() : "-"}</td>
      </tr>
    `;
  });

  renderPaginacao();
}

function renderPaginacao(){

  const totalPaginas = Math.ceil(dadosFiltrados.length / porPagina) || 1;

  let html = `
    <button onclick="mudarPagina(-1)">◀</button>
    Página ${paginaAtual} de ${totalPaginas}
    <button onclick="mudarPagina(1)">▶</button>
  `;

  let pagDiv = document.getElementById("paginacao");

  if(!pagDiv){
    pagDiv = document.createElement("div");
    pagDiv.id = "paginacao";
    pagDiv.style.textAlign = "center";
    pagDiv.style.marginTop = "15px";
    document.querySelector(".table-box").appendChild(pagDiv);
  }

  pagDiv.innerHTML = html;
}

function mudarPagina(direcao){

  const totalPaginas = Math.ceil(dadosFiltrados.length / porPagina);

  paginaAtual += direcao;

  if(paginaAtual < 1) paginaAtual = 1;
  if(paginaAtual > totalPaginas) paginaAtual = totalPaginas;

  renderTabela();
}

const totalEl = document.getElementById("total");
const hojeEl = document.getElementById("hoje");
const semanaEl = document.getElementById("semana");
const mesEl = document.getElementById("mes");
const anoEl = document.getElementById("ano");

fetch(URL)
.then(r=>r.json())
.then(res=>{
  dados = res.relatorio || [];

  calcularIndicadoresBase(dados); // 🔥 base fixa
  atualizarTotal(dados); // 🔥 total inicial

  processar(dados);
});

function gerarPDF(){

  // 🔥 ordena por data (mais recente primeiro)
  const dadosPDF = [...dadosFiltrados].sort(
    (a,b)=> new Date(b.data) - new Date(a.data)
  );

  // 🔥 captura gráficos como imagem
  const imgHistorico = charts.historico.toBase64Image();
  const imgCanal = charts.canal.toBase64Image();
  const imgTipo = charts.tipo.toBase64Image();
  const imgLotacao = charts.lotacao.toBase64Image();

  let conteudo = `
    <html>
    <head>
      <title>Relatório NAP</title>
      <style>
        body{ font-family: Arial; padding:20px; }
        h2{ text-align:center; margin-bottom:5px; }
        .data{ text-align:center; font-size:12px; margin-bottom:20px; }

        .graficos{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:20px;
          margin-bottom:30px;
        }

        .grafico{
          text-align:center;
        }

        .grafico img{
          width:100%;
          max-height:250px;
        }

        table{
          width:100%;
          border-collapse:collapse;
          font-size:11px;
        }

        th,td{
          border:1px solid #ccc;
          padding:5px;
        }

        th{
          background:#facc15;
        }
      </style>
    </head>
    <body>

    <h2>Relatório Completo - NAP</h2>
    <div class="data">
      Gerado em: ${new Date().toLocaleString()}
    </div>

    <div class="graficos">
      <div class="grafico">
        <h4>Histórico</h4>
        <img src="${imgHistorico}">
      </div>

      <div class="grafico">
        <h4>Canal</h4>
        <img src="${imgCanal}">
      </div>

      <div class="grafico">
        <h4>Tipo</h4>
        <img src="${imgTipo}">
      </div>

      <div class="grafico">
        <h4>Lotação</h4>
        <img src="${imgLotacao}">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Lotação</th>
          <th>Tipo</th>
          <th>Qtd</th>
          <th>Canal</th>
          <th>Descrição</th>
          <th>Responsável</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody>
  `;

  // 🔥 tabela completa (SEM paginação)
  dadosPDF.forEach(r=>{
    conteudo += `
      <tr>
        <td>${r.lotacao||"-"}</td>
        <td>${r.tipo||"-"}</td>
        <td>${r.quantidade||"-"}</td>
        <td>${r.canal||"-"}</td>
        <td>${r.descricao||"-"}</td>
        <td>${r.responsavel||"-"}</td>
        <td>${r.data ? new Date(r.data).toLocaleDateString() : "-"}</td>
      </tr>
    `;
  });

  conteudo += `
      </tbody>
    </table>

    </body>
    </html>
  `;

  const win = window.open('', '', 'width=1000,height=800');
  win.document.write(conteudo);
  win.document.close();

  win.focus();
  win.print();
}
</script>

</body>
</html>
