<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard NAP - Inteligência</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #eab308;
            --bg: #f1f5f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
            padding-top: 85px;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: #1e3a8a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }

        .navbar h1 {
            color: #ffffff;
            font-size: 22px;
            margin: 0;
            font-weight: 600;
        }

        .btn-nav {
            background: var(--secondary); color: #1e293b; font-weight: 700;
            padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer;
            text-decoration: none; font-size: 12px; transition: 0.2s;
        }

        /* INDICADORES */
        .cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; margin-bottom: 15px;
        }

        .card {
            background: white; padding: 12px; border-radius: 8px; text-align: center;
            border-bottom: 3px solid var(--secondary); box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card h2 { margin: 5px 0 0; color: var(--primary); font-size: 22px; }
        .card p { margin: 0; font-size: 10px; font-weight: bold; color: #64748b; text-transform: uppercase; }

        /* FILTROS */
        .filtro-box {
            background: white; padding: 10px 15px; border-radius: 8px;
            display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
            margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .filtro-item { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 120px; }
        .filtro-item label { font-size: 10px; font-weight: bold; color: #64748b; }
        
        input[type="date"], .choices__inner {
            height: 34px !important; min-height: 34px !important; border-radius: 5px !important;
            padding: 0 8px !important; font-size: 12px !important; background: #f8fafc !important;
        }

        /* GRÁFICOS */
        .graficos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .chart-box {
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 320px;
            display: flex; flex-direction: column; position: relative;
            page-break-inside: avoid;
        }

        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .chart-box h3 { margin: 0; font-size: 14px; color: var(--primary); }
        .canvas-container { flex: 1; position: relative; min-height: 0; }

        .period-selector { display: flex; gap: 5px; }
        .btn-period { 
            font-size: 9px; padding: 3px 7px; border: 1px solid #cbd5e1; 
            background: white; border-radius: 4px; cursor: pointer; 
        }
        .btn-period.active { background: var(--primary); color: white; }

        /* TABELA */
        .table-box {
            margin-top: 15px; background: white; border-radius: 10px;
            overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #f8fafc; padding: 10px; text-align: left; color: #64748b; }
        td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; }

        .pagination { display: flex; justify-content: center; align-items: center; padding: 10px; gap: 15px; }
        .btn-pag { padding: 5px 12px; border-radius: 4px; border: 1px solid #cbd5e1; cursor: pointer; background: white; }

        /* ============================================================
           REGRAS DE IMPRESSÃO (PDF)
           ============================================================ */
        @media print {
            @page { size: portrait; margin: 1cm; }
            body { padding: 0; background: white !important; }
            .navbar, .filtro-box, .pagination, .btn-period, .btn-nav { display: none !important; }
            
            .cards { grid-template-columns: repeat(5, 1fr); margin-bottom: 20px; }
            .card { border: 1px solid #ddd; box-shadow: none; border-bottom: 2px solid var(--secondary); }

            .graficos-grid { display: block !important; }

            .chart-box { 
                width: 100%; 
                height: 400px !important; 
                margin-bottom: 20px; 
                border: 1px solid #eee;
                page-break-inside: avoid;
            }

            .chart-box:nth-of-type(2n) {
                page-break-after: always;
            }

            /* AJUSTE PARA LISTA COMPLETA NO PDF */
            .table-box { 
                border: none; 
                overflow: visible !important; 
                height: auto !important; 
                display: block !important;
            }
            table { font-size: 10px; width: 100%; table-layout: auto !important; }
            tr { page-break-inside: avoid; }
            
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        @media(max-width: 900px) { .graficos-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="navbar">
    <div style="display:flex; align-items:center; gap:12px;">
        <img src="PCBA.png" height="80">
        <h1>Sumário de Atividades - Núcleo de Assuntos Prisionais (NAP)</h1>
    </div>
    <div>
        <button class="btn-nav" style="background:#fff; margin-right:8px" onclick="prepararEImprimir()">Gerar PDF / Imprimir</button>
        <a href="index.html" class="btn-nav">Novo Registro</a>
    </div>
</header>

<div class="cards">
    <div class="card"><p>Acumulado</p><h2 id="total">0</h2></div>
    <div class="card"><p>Hoje</p><h2 id="hoje">0</h2></div>
    <div class="card"><p>Últimos 7d</p><h2 id="semana">0</h2></div>
    <div class="card"><p>Mês Atual</p><h2 id="mes">0</h2></div>
    <div class="card"><p>Ano</p><h2 id="ano">0</h2></div>
</div>

<div class="filtro-box">
    <div class="filtro-item"><label>Início</label><input type="date" id="inicio"></div>
    <div class="filtro-item"><label>Fim</label><input type="date" id="fim"></div>
    <div class="filtro-item"><label>Lotação</label><select id="filtroLotacao"><option value="">Todas</option></select></div>
    <div class="filtro-item"><label>Tipo</label><select id="filtroTipo"><option value="">Todos</option></select></div>
    <div class="filtro-item"><label>Canal</label><select id="filtroCanal"><option value="">Todos</option></select></div>
    <button class="btn-nav" style="height:34px; padding: 0 20px" onclick="aplicarFiltro()">Atualizar</button>
</div>

<div class="graficos-grid">
    <div class="chart-box">
        <div class="chart-header">
            <h3>Evolução Temporal</h3>
            <div class="period-selector">
                <button class="btn-period active" onclick="mudarPeriodo('mes', this)">Mês</button>
                <button class="btn-period" onclick="mudarPeriodo('trimestre', this)">Trimestre</button>
                <button class="btn-period" onclick="mudarPeriodo('semestre', this)">Semestre</button>
            </div>
        </div>
        <div class="canvas-container"><canvas id="historico"></canvas></div>
    </div>
    <div class="chart-box">
        <div class="chart-header"><h3>Distribuição por Canal</h3></div>
        <div class="canvas-container"><canvas id="canal"></canvas></div>
    </div>
    <div class="chart-box">
        <div class="chart-header"><h3>Ranking por Tipo</h3></div>
        <div class="canvas-container"><canvas id="tipo"></canvas></div>
    </div>
    <div class="chart-box">
        <div class="chart-header"><h3>Volume por Lotação</h3></div>
        <div class="canvas-container"><canvas id="lotacao"></canvas></div>
    </div>
</div>

<div class="table-box">
    <table>
        <thead>
            <tr>
                <th>Lotação</th>
                <th>Tipo</th>
                <th>Descrição</th>
                <th>Qtd</th>
                <th>Canal</th>
                <th>Responsável</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>
    <div class="pagination">
        <button class="btn-pag" id="prevPage" onclick="mudarPagina(-1)">Anterior</button>
        <span id="pageInfo" style="font-size: 11px; font-weight: bold">Página 1</span>
        <button class="btn-pag" id="nextPage" onclick="mudarPagina(1)">Próxima</button>
    </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbz5UKYgpRxCjUJx6ilQBWDzO-StPxs4w214VWNanoXPKCaDYrgBK4bPRNAAIooia-5SnA/exec";
Chart.register(ChartDataLabels);

let dadosOriginal = [];
let dadosFiltrados = [];
let charts = {};
let periodoAtual = 'mes';
let paginaAtual = 1;
const itensPorPagina = 10;
let isPrinting = false;

function prepararEImprimir() {
    isPrinting = true;
    renderTabela(); 
    
    // Aumentado para 800ms para garantir que o celular renderize a tabela gigante
    setTimeout(() => {
        window.print();
        isPrinting = false;
        renderTabela(); 
    }, 800);
}

function criar(id, tipo, labels, data){
    if(charts[id]) charts[id].destroy();
    const isLine = tipo === 'line';

    charts[id] = new Chart(document.getElementById(id), {
        type: tipo,
        data: {
            labels,
            datasets: [{
                data,
                backgroundColor: isLine ? 'rgba(30, 58, 138, 0.1)' : ['#1e3a8a','#eab308','#3b82f6','#10b981','#f59e0b','#6366f1'],
                borderColor: '#1e3a8a',
                borderWidth: isLine ? 3 : 0,
                fill: isLine,
                tension: 0.4,
                pointRadius: isLine ? 4 : 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
                legend: { display: (tipo === 'pie' || tipo === 'doughnut'), position: 'bottom' },
                datalabels: {
                    color: isLine ? '#1e3a8a' : '#fff',
                    anchor: isLine ? 'end' : 'center',
                    align: isLine ? 'top' : 'center',
                    offset: 5,
                    font: { weight: 'bold', size: 10 },
                    formatter: Math.round
                }
            },
            scales: !['pie', 'doughnut'].includes(tipo) ? {
                y: { display: false },
                x: { grid: { display: false }, ticks: { font: { size: 10 } } }
            } : {}
        }
    });
}

function mudarPeriodo(p, btn) {
    periodoAtual = p;
    document.querySelectorAll('.btn-period').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    processar(dadosFiltrados);
}

function aplicarFiltro(){
    const ini = document.getElementById("inicio").value;
    const fim = document.getElementById("fim").value;
    const lot = document.getElementById("filtroLotacao").value;
    const tip = document.getElementById("filtroTipo").value;
    const can = document.getElementById("filtroCanal").value;

    // Ajuste aqui: Forçamos o início para 00:00:00 e o fim para 23:59:59
    const dataIni = ini ? new Date(ini + 'T00:00:00') : null;
    const dataFim = fim ? new Date(fim + 'T23:59:59') : null;

    dadosFiltrados = dadosOriginal.filter(r => {
        let d = new Date(r.data);
        let ok = true;
        
        // Usamos as novas variáveis de data para comparar
        if(dataIni) ok &= (d >= dataIni);
        if(dataFim) ok &= (d <= dataFim);
        
        if(lot) ok &= (r.lotacao === lot);
        if(tip) ok &= (r.tipo === tip);
        if(can) ok &= (r.canal === can);
        
        return ok;
    });
    
    paginaAtual = 1;
    processar(dadosFiltrados);
}

function getPeriodKey(dateStr) {
    const d = new Date(dateStr);
    const year = d.getFullYear();
    if (periodoAtual === 'trimestre') {
        return `${Math.floor(d.getMonth() / 3) + 1}º Trim ${year}`;
    } else if (periodoAtual === 'semestre') {
        return `${d.getMonth() < 6 ? 1 : 2}º Sem ${year}`;
    }
    return d.toISOString().slice(0,7);
}

function processar(rel){
    let tot=0, h=0, s=0, m=0, a=0;
    const now = new Date();
    const sem7 = new Date(); sem7.setDate(now.getDate() - 7);
    const counts = { tipo:{}, canal:{}, lot:{}, hist:{} };

    rel.forEach(r => {
        const q = Number(r.quantidade) || 0;
        const d = new Date(r.data);
        tot += q;
        if(d.toDateString() === now.toDateString()) h += q;
        if(d >= sem7) s += q;
        if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) m += q;
        if(d.getFullYear() === now.getFullYear()) a += q;

        counts.tipo[r.tipo] = (counts.tipo[r.tipo]||0) + q;
        counts.canal[r.canal] = (counts.canal[r.canal]||0) + q;
        counts.lot[r.lotacao] = (counts.lot[r.lotacao]||0) + q;
        counts.hist[getPeriodKey(r.data)] = (counts.hist[getPeriodKey(r.data)]||0) + q;
    });

    document.getElementById("total").innerText = tot;
    document.getElementById("hoje").innerText = h;
    document.getElementById("semana").innerText = s;
    document.getElementById("mes").innerText = m;
    document.getElementById("ano").innerText = a;

    criar("tipo", "bar", Object.keys(counts.tipo), Object.values(counts.tipo));
    criar("canal", "doughnut", Object.keys(counts.canal), Object.values(counts.canal));
    criar("lotacao", "pie", Object.keys(counts.lot), Object.values(counts.lot));
    criar("historico", "line", Object.keys(counts.hist), Object.values(counts.hist));

    renderTabela();
}

function renderTabela() {
    let itensParaExibir;
    
    if (isPrinting) {
        itensParaExibir = dadosFiltrados.slice().reverse();
    } else {
        const inicio = (paginaAtual - 1) * itensPorPagina;
        const fim = inicio + itensPorPagina;
        itensParaExibir = dadosFiltrados.slice().reverse().slice(inicio, fim);
    }

    const tb = document.getElementById("tabela");
    tb.innerHTML = itensParaExibir.map(r => `
        <tr>
            <td>${r.lotacao}</td>
            <td>${r.tipo}</td>
            <td>${r.descricao}</td>
            <td><b>${r.quantidade}</b></td>
            <td>${r.canal}</td>
            <td>${r.responsavel}</td>
            <td>${new Date(r.data).toLocaleDateString()}</td>
        </tr>
    `).join('');

    const totalPaginas = Math.ceil(dadosFiltrados.length / itensPorPagina);
    document.getElementById("pageInfo").innerText = `Página ${paginaAtual} de ${totalPaginas || 1}`;
    document.getElementById("prevPage").disabled = paginaAtual === 1;
    document.getElementById("nextPage").disabled = paginaAtual >= totalPaginas;
}

function mudarPagina(dir) {
    paginaAtual += dir;
    renderTabela();
}

fetch(URL).then(r => r.json()).then(res => {
    dadosOriginal = res.relatorio || [];
    dadosFiltrados = [...dadosOriginal];

    const fills = { 
        filtroLotacao: [...new Set(dadosOriginal.map(d => d.lotacao))],
        filtroTipo: [...new Set(dadosOriginal.map(d => d.tipo))],
        filtroCanal: [...new Set(dadosOriginal.map(d => d.canal))]
    };

    Object.keys(fills).forEach(id => {
        fills[id].forEach(val => { if(val) document.getElementById(id).innerHTML += `<option value="${val}">${val}</option>`; });
        new Choices('#' + id, { searchEnabled: true, itemSelectText: '', allowHTML: true });
    });

    processar(dadosFiltrados);
});
</script>
</body>
</html>
